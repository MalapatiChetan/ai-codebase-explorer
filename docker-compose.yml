version: '3.8'

services:
  api:
    build: .
    container_name: ai-codebase-explainer
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEBUG=false
      - REPO_CLONE_PATH=/app/data/repos
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codebase-explainer

networks:
  codebase-explainer:
    driver: bridge
