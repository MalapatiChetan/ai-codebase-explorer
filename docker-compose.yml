version: '3.8'

services:
  api:
    build: .
    container_name: ai-codebase-explainer
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL=${GOOGLE_MODEL:-gemini-2.5-flash}
      - ENABLE_AI_CHAT=${ENABLE_AI_CHAT:-true}
      - DEBUG=${DEBUG:-false}
      - REPO_CLONE_PATH=${REPO_CLONE_PATH:-/tmp/ai-explainer/repos}
      - DIAGRAM_OUTPUT_PATH=${DIAGRAM_OUTPUT_PATH:-/tmp/ai-explainer/diagrams}
      - RAG_INDEX_PATH=${RAG_INDEX_PATH:-/tmp/ai-explainer/rag_indices}
    volumes:
      - ./data:/tmp/ai-explainer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codebase-explainer

networks:
  codebase-explainer:
    driver: bridge
